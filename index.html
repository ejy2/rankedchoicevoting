<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WOC Ranked Choice Voting</title>

<style>
:root {
  /* Deep Earthy Palette */
  --bg: #1c1b17;        /* Night Soil */
  --surface: #26241f;   /* Dark Clay */
  --surface2: #333029;  /* Weathered Stone */
  --border: #423d33;    /* Tree Bark */
  
  --accent: #7d8c61;    /* Mossy Green */
  --accent2: #b58d63;   /* Ochre / Sandstone */
  --danger: #9e4a3a;    /* Terracotta */
  
  --text: #e3ddd3;      /* Unbleached Linen */
  --muted: #8c8578;     /* River Silt */
  
  --winner: #a3c276;    /* Lichen Green */
}

body {
  font-family: 'Georgia', 'Times New Roman', serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  margin: 0;
  padding: 2rem;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.container {
  max-width: 900px;
  width: 100%;
}

header {
  text-align: center;
  margin-bottom: 3rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 20px;
}

h1 {
  color: var(--accent2);
  font-weight: normal;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin: 0;
}

.sub-header {
  color: var(--muted);
  font-style: italic;
  font-size: 0.9rem;
}

.file-zone {
  background: var(--surface);
  border: 2px dashed var(--border);
  padding: 3rem 1rem;
  text-align: center;
  border-radius: 12px;
  margin-bottom: 3rem;
  transition: all 0.3s ease;
}

.file-zone:hover {
  border-color: var(--accent);
  background: #2a2822;
}

input[type="file"] {
  display: block;
  margin: 1rem auto;
  color: var(--muted);
  cursor: pointer;
}

.election-block {
  margin-bottom: 5rem;
}

.election-title {
  color: var(--accent);
  font-size: 2rem;
  margin-bottom: 1.5rem;
  padding-left: 15px;
  border-left: 6px solid var(--accent2);
}

.round-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  box-shadow: 0 6px 12px rgba(0,0,0,0.4);
}

.round-label {
  color: var(--accent2);
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 1rem;
  display: block;
}

.candidate-item {
  margin: 15px 0;
}

.progress-group {
  display: flex;
  align-items: center;
  gap: 15px;
}

.progress-track {
  flex-grow: 1;
  height: 10px;
  background: var(--surface2);
  border-radius: 5px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 1.2s cubic-bezier(0.1, 0.5, 0.2, 1);
}

.stats-text {
  font-family: 'Courier New', Courier, monospace;
  font-size: 0.85rem;
  min-width: 90px;
  color: var(--muted);
}

.elim-notice {
  margin-top: 15px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  color: var(--danger);
  font-size: 0.9rem;
}

.winner-notice {
  margin-top: 20px;
  padding: 20px;
  background: rgba(163, 194, 118, 0.1);
  border: 1px solid var(--winner);
  color: var(--winner);
  text-align: center;
  border-radius: 6px;
  font-size: 1.3rem;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <header>
    <h1>WOC Ranked Choice Voting</h1>
    <div class="sub-header">Stability through mathematical consensus.</div>
  </header>
  
  <div class="file-zone">
    <label for="fileInput">Choose a CSV file to begin the count</label>
    <input type="file" id="fileInput" accept=".csv">
  </div>

  <div id="output"></div>
</div>

<script>
let parsedData;

document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = () => {
    const text = reader.result;
    parsedData = parseCSV(text);
    if (parsedData) {
      processElections();
    }
  };

  reader.readAsText(file);
});

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length === 0) return null;
  
  const headers = lines[0].split(",").map(h => h.trim());
  const rows = lines.slice(1).map(l => l.split(",").map(cell => cell.trim()));
  return { headers, rows };
}

function processElections() {
  const container = document.getElementById('output');
  container.innerHTML = ""; 

  // Group columns by checking for the [Rank] trigger
  const electionGroups = {};
  parsedData.headers.forEach((header, idx) => {
    // Captures everything before "[Rank" as the election name
    const match = header.match(/(.*?)\s*\[Rank/i);
    const electionName = match ? match[1].trim() : header.trim();
    
    if (!electionGroups[electionName]) electionGroups[electionName] = [];
    electionGroups[electionName].push(idx);
  });

  // Run the logic for each unique election found
  Object.keys(electionGroups).forEach(name => {
    const colIndices = electionGroups[name];
    
    // Create ballots by mapping rows to the grouped columns
    const ballots = parsedData.rows.map(row => {
        return colIndices.map(idx => row[idx]).filter(val => val && val.length > 0);
    }).filter(b => b.length > 0);

    if (ballots.length === 0) return;

    // UI Construction
    const electionBlock = document.createElement('div');
    electionBlock.className = 'election-block';
    const title = document.createElement('h2');
    title.className = 'election-title';
    title.textContent = name;
    electionBlock.appendChild(title);
    container.appendChild(electionBlock);

    runRCVLogic(ballots, electionBlock);
  });
}

function runRCVLogic(ballots, parentElement) {
  const allCandidates = [...new Set(ballots.flat())];
  let remaining = [...allCandidates];
  const rounds = [];

  while (remaining.length > 0) {
    const counts = {};
    remaining.forEach(c => counts[c] = 0);

    // Tally current top-valid-choice
    ballots.forEach(ballot => {
      const top = ballot.find(c => remaining.includes(c));
      if (top) counts[top]++;
    });

    const total = Object.values(counts).reduce((a, b) => a + b, 0);
    const sorted = [...remaining].sort((a, b) => counts[b] - counts[a]);
    
    const data = { counts: { ...counts }, total: total };
    rounds.push(data);

    // Success condition: Majority or only 1 left
    if (total === 0 || (counts[sorted[0]] / total) > 0.5 || remaining.length <= 1) {
      data.winner = sorted[0];
      renderRounds(rounds, parentElement);
      return;
    }

    // Elimination logic (find lowest, tie-break alphabetically)
    const minVotes = counts[sorted[sorted.length - 1]];
    const candidatesAtMin = sorted.filter(c => counts[c] === minVotes);
    const eliminated = candidatesAtMin.sort()[0];
    
    data.eliminated = eliminated;
    remaining = remaining.filter(c => c !== eliminated);
  }
}

function renderRounds(rounds, parentElement) {
  rounds.forEach((round, i) => {
    const box = document.createElement('div');
    box.className = 'round-box';

    const label = document.createElement('span');
    label.className = 'round-label';
    label.textContent = `Tabulation Round ${i + 1}`;
    box.appendChild(label);

    const entries = Object.entries(round.counts).sort((a,b) => b[1] - a[1]);

    entries.forEach(([name, count]) => {
      const pct = round.total > 0 ? (count / round.total) * 100 : 0;
      
      const item = document.createElement('div');
      item.className = 'candidate-item';
      item.innerHTML = `<div>${name}</div>`;

      const group = document.createElement('div');
      group.className = 'progress-group';

      const track = document.createElement('div');
      track.className = 'progress-track';
      const fill = document.createElement('div');
      fill.className = 'progress-fill';
      setTimeout(() => fill.style.width = pct + '%', 150);
      
      track.appendChild(fill);
      group.appendChild(track);

      const stats = document.createElement('span');
      stats.className = 'stats-text';
      stats.textContent = `${count} (${pct.toFixed(1)}%)`;
      group.appendChild(stats);

      item.appendChild(group);
      box.appendChild(item);
    });

    if (round.eliminated && !round.winner) {
      const elim = document.createElement('div');
      elim.className = 'elim-notice';
      elim.textContent = `Candidate eliminated: ${round.eliminated}`;
      box.appendChild(elim);
    }

    if (round.winner) {
      const win = document.createElement('div');
      win.className = 'winner-notice';
      win.textContent = `✓ ELECTED: ${round.winner}`;
      box.appendChild(win);
    }

    parentElement.appendChild(box);
  });
}
</script>

</body>
</html>
