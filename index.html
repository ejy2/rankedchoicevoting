<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natural Ranked Choice Voting</title>

<style>
:root {
  /* Earth & Forest Palette */
  --bg: #1e1c1a;        /* Dark Earth */
  --surface: #2b2824;   /* Dry Mud */
  --surface2: #38342e;  /* Warm Stone */
  --border: #4a4439;    /* Bark */
  
  --accent: #7a8e61;    /* Sage/Moss */
  --accent2: #b89166;   /* Sandstone */
  --danger: #9c4a3d;    /* Red Clay */
  
  --text: #d9d2c5;      /* Parchment */
  --muted: #8c8475;     /* Silt */
  
  --winner: #9eb86d;    /* Fern */
}

body {
  font-family: 'Georgia', serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  margin: 0;
  padding: 2rem;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.container {
  max-width: 900px;
  width: 100%;
}

h1 {
  color: var(--accent2);
  text-align: center;
  font-weight: normal;
  letter-spacing: 1px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 20px;
  margin-bottom: 30px;
}

.file-upload {
  background: var(--surface);
  border: 2px dashed var(--border);
  padding: 2rem;
  text-align: center;
  border-radius: 8px;
  margin-bottom: 2rem;
  transition: border-color 0.3s;
}

.file-upload:hover {
  border-color: var(--accent);
}

input[type="file"] {
  color: var(--muted);
}

.election-container {
  margin-top: 4rem;
  background: rgba(0,0,0,0.1);
  padding: 1rem;
  border-radius: 12px;
}

.election-header {
  color: var(--accent);
  font-size: 1.8rem;
  margin-bottom: 1.5rem;
  border-left: 4px solid var(--accent2);
  padding-left: 15px;
}

.round-card {
  margin-bottom: 2rem;
  padding: 1.5rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.round-title {
  margin-top: 0;
  font-size: 1.1rem;
  color: var(--accent2);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.candidate-row {
  margin: 12px 0;
}

.bar-wrapper {
  display: flex;
  align-items: center;
  gap: 15px;
}

.bar-bg {
  flex-grow: 1;
  height: 12px;
  background: var(--surface2);
  border-radius: 6px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 1s ease-out;
}

.vote-stats {
  font-family: monospace;
  font-size: 0.9rem;
  min-width: 100px;
  color: var(--muted);
}

.elimination-msg {
  margin-top: 15px;
  color: var(--danger);
  font-style: italic;
  font-size: 0.95rem;
}

.winner-msg {
  margin-top: 15px;
  padding: 15px;
  background: rgba(158, 184, 109, 0.1);
  border: 1px solid var(--winner);
  color: var(--winner);
  text-align: center;
  font-weight: bold;
  border-radius: 6px;
  font-size: 1.2rem;
}

hr {
    border: 0;
    border-top: 1px solid var(--border);
    margin: 4rem 0;
}
</style>
</head>

<body>

<div class="container">
  <h1>Forest Court Tabulator</h1>
  
  <div class="file-upload">
    <p style="margin-top:0">Upload your Ranked Choice CSV</p>
    <input type="file" id="fileInput" accept=".csv">
  </div>

  <div id="output"></div>
</div>

<script>
let parsedData;

document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = () => {
    parsedData = parseCSV(reader.result);
    processAllElections();
  };

  reader.readAsText(file);
});

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length === 0) return null;
  
  const headers = lines[0].split(",").map(h => h.trim());
  const rows = lines.slice(1).map(l => l.split(",").map(cell => cell.trim()));
  return { headers, rows };
}

function processAllElections() {
  const container = document.getElementById('output');
  container.innerHTML = ""; 

  // 1. Group columns by Election Name
  // Regex looks for text inside the first pair of brackets: [Election Name]
  const electionGroups = {};
  parsedData.headers.forEach((header, idx) => {
    const match = header.match(/^\[(.*?)\]/);
    const electionName = match ? match[1] : "General Election";
    
    if (!electionGroups[electionName]) electionGroups[electionName] = [];
    electionGroups[electionName].push(idx);
  });

  // 2. Run RCV for each group
  Object.keys(electionGroups).forEach(name => {
    const colIndices = electionGroups[name];
    
    // Create ballots: Each row becomes an array of candidates in order of preference
    const ballots = parsedData.rows.map(row => {
        return colIndices.map(idx => row[idx]).filter(val => val && val.length > 0);
    }).filter(b => b.length > 0);

    if (ballots.length === 0) return;

    // Create UI Section
    const section = document.createElement('div');
    section.className = 'election-container';
    const title = document.createElement('h2');
    title.className = 'election-header';
    title.textContent = name;
    section.appendChild(title);
    container.appendChild(section);

    runRCV(ballots, section);
  });
}

function runRCV(ballots, parentElement) {
  // Get all unique candidates involved in this election
  const allCandidates = [...new Set(ballots.flat())];
  let remainingCandidates = [...allCandidates];
  const rounds = [];

  while (remainingCandidates.length > 0) {
    const counts = {};
    remainingCandidates.forEach(c => counts[c] = 0);

    // Count current top choice for each ballot
    ballots.forEach(ballot => {
      const topChoice = ballot.find(c => remainingCandidates.includes(c));
      if (topChoice) counts[topChoice]++;
    });

    const totalVotes = Object.values(counts).reduce((a, b) => a + b, 0);
    const sorted = [...remainingCandidates].sort((a, b) => counts[b] - counts[a]);
    
    const roundData = { counts: { ...counts }, total: totalVotes };
    rounds.push(roundData);

    // Check for winner (>50%)
    if (totalVotes === 0 || (counts[sorted[0]] / totalVotes) > 0.5 || remainingCandidates.length <= 1) {
      roundData.winner = sorted[0];
      renderRounds(rounds, parentElement);
      return;
    }

    // Eliminate the candidate with the fewest votes
    const minVotes = counts[sorted[sorted.length - 1]];
    const candidatesWithMin = sorted.filter(c => counts[c] === minVotes);
    
    // Tie-break for elimination: alphabetical for consistency
    const eliminated = candidatesWithMin.sort()[0];
    roundData.eliminated = eliminated;
    remainingCandidates = remainingCandidates.filter(c => c !== eliminated);
  }
}

function renderRounds(rounds, parentElement) {
  rounds.forEach((round, i) => {
    const card = document.createElement('div');
    card.className = 'round-card';

    const h3 = document.createElement('h3');
    h3.className = 'round-title';
    h3.textContent = `Round ${i + 1}`;
    card.appendChild(h3);

    const sortedEntries = Object.entries(round.counts).sort((a,b) => b[1] - a[1]);

    sortedEntries.forEach(([name, votes]) => {
      const pct = round.total > 0 ? (votes / round.total) * 100 : 0;
      
      const row = document.createElement('div');
      row.className = 'candidate-row';
      
      const label = document.createElement('div');
      label.textContent = name;
      row.appendChild(label);

      const barWrapper = document.createElement('div');
      barWrapper.className = 'bar-wrapper';

      const barBg = document.createElement('div');
      barBg.className = 'bar-bg';
      const fill = document.createElement('div');
      fill.className = 'bar-fill';
      setTimeout(() => fill.style.width = pct + '%', 100);
      
      barBg.appendChild(fill);
      barWrapper.appendChild(barBg);

      const stats = document.createElement('span');
      stats.className = 'vote-stats';
      stats.textContent = `${votes} (${pct.toFixed(1)}%)`;
      barWrapper.appendChild(stats);

      row.appendChild(barWrapper);
      card.appendChild(row);
    });

    if (round.eliminated && !round.winner) {
      const elim = document.createElement('div');
      elim.className = 'elimination-msg';
      elim.textContent = `✕ ${round.eliminated} eliminated (lowest vote count)`;
      card.appendChild(elim);
    }

    if (round.winner) {
      const win = document.createElement('div');
      win.className = 'winner-msg';
      win.textContent = `WINNER: ${round.winner}`;
      card.appendChild(win);
    }

    parentElement.appendChild(card);
  });
}
</script>

</body>
</html>
