<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranked Choice Voting</title>

<style>
:root {
  --bg: #1b1a17;
  --surface: #24221e;
  --surface2: #2e2b26;
  --border: #3a362f;

  --accent: #6b8e23;
  --accent2: #a67c52;
  --danger: #b04a3a;

  --text: #e6e1d9;
  --muted: #8a8378;

  --winner: #7aa33a;
}

body {
  font-family: Georgia, 'Times New Roman', serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  padding: 2rem;
}

h1 {
  color: var(--accent);
  margin-bottom: 1rem;
}

input {
  margin-bottom: 1.5rem;
}

.round {
  margin-bottom: 1.5rem;
  padding: 1rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
}

.bar {
  height: 20px;
  background: var(--surface2);
  margin: 5px 0;
  position: relative;
}

.fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.5s;
}

.eliminated {
  color: var(--danger);
}

.winner {
  color: var(--winner);
  font-weight: bold;
}
</style>
</head>

<body>

<h1>Ranked Choice Voting</h1>
<input type="file" id="fileInput" accept=".csv">

<div id="output"></div>

<script>
let parsedData;

document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = () => {
    parsedData = parseCSV(reader.result);
    runElection();
  };

  reader.readAsText(file);
});

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  const headers = lines[0].split(",");
  const rows = lines.slice(1).map(l => l.split(","));
  return { headers, rows };
}

function runElection() {
  const candidates = [...new Set(parsedData.rows.flat())].filter(Boolean);

  const ballots = parsedData.rows.map(row =>
    row.filter(Boolean)
  );

  let remaining = [...candidates];
  const rounds = [];

  while (true) {
    const counts = {};
    remaining.forEach(c => counts[c] = 0);

    ballots.forEach(ballot => {
      const pick = ballot.find(c => remaining.includes(c));
      if (pick) counts[pick]++;
    });

    const total = Object.values(counts).reduce((a,b)=>a+b,0);
    rounds.push({ counts: {...counts}, total });

    const sorted = remaining.slice().sort((a,b)=>counts[b]-counts[a]);

    if (counts[sorted[0]] / total > 0.5 || remaining.length <= 2) {
      rounds[rounds.length-1].winner = sorted[0];
      render(rounds);
      return;
    }

    // Deterministic tie-breaking
    const minVotes = counts[sorted[sorted.length-1]];
    const toElim = sorted.filter(c => counts[c] === minVotes);

    let eliminated;

    if (toElim.length === 1) {
      eliminated = toElim[0];
    } else {
      for (let i = rounds.length - 2; i >= 0; i--) {
        const prev = rounds[i].counts;

        const sortedTie = toElim.slice().sort((a,b)=>{
          return (prev[a]||0) - (prev[b]||0);
        });

        if ((prev[sortedTie[0]]||0) !== (prev[sortedTie[1]]||0)) {
          eliminated = sortedTie[0];
          break;
        }
      }

      if (!eliminated) {
        eliminated = toElim.sort()[0];
      }
    }

    rounds[rounds.length-1].eliminated = eliminated;
    remaining = remaining.filter(c => c !== eliminated);
  }
}

function render(rounds) {
  const container = document.getElementById('output');
  container.innerHTML = "";

  rounds.forEach((round, i) => {
    const div = document.createElement('div');
    div.className = 'round';

    const title = document.createElement('h3');
    title.textContent = "Round " + (i + 1);
    div.appendChild(title);

    const total = round.total || 1;

    Object.entries(round.counts).forEach(([c,v]) => {
      const pct = (v / total) * 100;

      const label = document.createElement('div');
      label.textContent = `${c} (${v})`;
      div.appendChild(label);

      const bar = document.createElement('div');
      bar.className = 'bar';

      const fill = document.createElement('div');
      fill.className = 'fill';
      setTimeout(() => fill.style.width = pct + '%', 50);

      bar.appendChild(fill);
      div.appendChild(bar);
    });

    if (round.eliminated) {
      const elim = document.createElement('div');
      elim.className = 'eliminated';
      elim.textContent = "Eliminated: " + round.eliminated;
      div.appendChild(elim);
    }

    if (round.winner) {
      const win = document.createElement('div');
      win.className = 'winner';
      win.textContent = "Winner: " + round.winner;
      div.appendChild(win);
    }

    container.appendChild(div);
  });
}
</script>

</body>
</html>
