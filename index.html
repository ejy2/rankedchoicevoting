<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WOC Ranked Choice Voting</title>

<style>
:root {
  /* Earthy "Forest Floor" Palette */
  --bg: #1c1b18;        /* Deep Soil */
  --surface: #26241f;   /* Dark Bark */
  --surface2: #302d26;  /* River Rock */
  --border: #3d3a31;    /* Silt */
  
  --accent: #7a8c61;    /* Moss Green */
  --accent2: #b89166;   /* Sandstone */
  --danger: #9c4a3d;    /* Red Clay */
  
  --text: #e0dbd1;      /* Parchment */
  --muted: #8c8575;     /* Dry Grass */
  
  --winner: #a3c276;    /* Lichen */
}

body {
  font-family: 'Georgia', 'Times New Roman', serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  margin: 0;
  padding: 2rem;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.container {
  max-width: 900px;
  width: 100%;
}

header {
  text-align: center;
  margin-bottom: 3rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 25px;
}

h1 {
  color: var(--accent2);
  font-weight: normal;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin: 0;
}

.sub-header {
  color: var(--muted);
  font-style: italic;
  font-size: 0.9rem;
  margin-top: 8px;
}

.upload-area {
  background: var(--surface);
  border: 2px dashed var(--border);
  padding: 3rem 1rem;
  text-align: center;
  border-radius: 12px;
  margin-bottom: 3rem;
  transition: all 0.3s ease;
}

.upload-area:hover {
  border-color: var(--accent);
  background: #2a2822;
}

input[type="file"] {
  display: block;
  margin: 1rem auto;
  color: var(--muted);
  cursor: pointer;
}

.election-card {
  margin-bottom: 5rem;
  border-top: 1px solid var(--border);
  padding-top: 2rem;
}

.election-name {
  color: var(--accent);
  font-size: 2.2rem;
  margin-bottom: 1.5rem;
  font-weight: normal;
  display: flex;
  align-items: center;
  gap: 15px;
}

.election-name::before {
  content: "";
  display: inline-block;
  width: 8px;
  height: 40px;
  background: var(--accent2);
}

.round-container {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}

.round-header {
  color: var(--accent2);
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 3px;
  margin-bottom: 1.2rem;
  display: block;
}

.candidate-entry {
  margin: 15px 0;
}

.progress-strip {
  display: flex;
  align-items: center;
  gap: 15px;
}

.bar-bg {
  flex-grow: 1;
  height: 12px;
  background: var(--surface2);
  border-radius: 6px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 1.2s cubic-bezier(0.1, 0.5, 0.2, 1);
}

.vote-tally {
  font-family: 'Courier New', monospace;
  font-size: 0.85rem;
  min-width: 110px;
  color: var(--muted);
  text-align: right;
}

.elim-text {
  margin-top: 15px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  color: var(--danger);
  font-style: italic;
  font-size: 0.9rem;
}

.winner-banner {
  margin-top: 20px;
  padding: 25px;
  background: rgba(163, 194, 118, 0.08);
  border: 2px solid var(--winner);
  color: var(--winner);
  text-align: center;
  border-radius: 8px;
  font-size: 1.5rem;
  font-weight: bold;
  letter-spacing: 1px;
}

.error-msg {
  text-align: center;
  color: var(--danger);
  background: rgba(156, 74, 58, 0.1);
  padding: 20px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">
  <header>
    <h1>WOC Ranked Choice Voting</h1>
    <div class="sub-header">All hail election god Ethan Young!</div>
  </header>
  
  <div class="upload-area">
    <label for="fileInput">Choose your CSV file to begin the count</label>
    <input type="file" id="fileInput" accept=".csv">
  </div>

  <div id="output"></div>
</div>

<script>
let csvData;

document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    csvData = parseCSV(reader.result);
    if (csvData) processRankedElections();
  };
  reader.readAsText(file);
});

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length === 0) return null;
  
  const headers = lines[0].split(",").map(h => h.trim());
  const rows = lines.slice(1).map(l => l.split(",").map(cell => cell.trim()));
  return { headers, rows };
}

function processRankedElections() {
  const container = document.getElementById('output');
  container.innerHTML = ""; 

  // STRICT FILTER: Match only columns ending in [Rank ...]
  // This captures the text before the rank as the "Election Name"
  const rankRegex = /^(.*?)\s*\[Rank\s*[^\]]+\]$/i;
  
  const groups = {};
  let validColumnCount = 0;

  csvData.headers.forEach((header, idx) => {
    const match = header.match(rankRegex);
    if (match) {
      const electionName = match[1].trim() || "Election";
      if (!groups[electionName]) groups[electionName] = [];
      groups[electionName].push(idx);
      validColumnCount++;
    }
  });

  if (validColumnCount === 0) {
    container.innerHTML = `<div class="error-msg">No valid data found. Ensure your columns end with <strong>[Rank 1]</strong>, <strong>[Rank 2]</strong>, etc.</div>`;
    return;
  }

  // Process each distinct group (category)
  Object.keys(groups).forEach(name => {
    const colIndices = groups[name];
    
    // Build ballots for this specific category
    const ballots = csvData.rows.map(row => {
        return colIndices.map(idx => row[idx]).filter(val => val && val.length > 0);
    }).filter(b => b.length > 0);

    if (ballots.length === 0) return;

    // UI Construction
    const card = document.createElement('div');
    card.className = 'election-card';
    const title = document.createElement('h2');
    title.className = 'election-name';
    title.textContent = name;
    card.appendChild(title);
    container.appendChild(card);

    runRCV(ballots, card);
  });
}

function runRCV(ballots, parent) {
  const allCandidates = [...new Set(ballots.flat())];
  let remaining = [...allCandidates];
  const rounds = [];

  while (remaining.length > 0) {
    const counts = {};
    remaining.forEach(c => counts[c] = 0);

    ballots.forEach(ballot => {
      const topValid = ballot.find(c => remaining.includes(c));
      if (topValid) counts[topValid]++;
    });

    const total = Object.values(counts).reduce((a, b) => a + b, 0);
    const sorted = [...remaining].sort((a, b) => counts[b] - counts[a]);
    
    const data = { counts: { ...counts }, total: total };
    rounds.push(data);

    // Majority check
    if (total === 0 || (counts[sorted[0]] / total) > 0.5 || remaining.length <= 1) {
      data.winner = sorted[0];
      render(rounds, parent);
      return;
    }

    // Eliminate lowest
    const minVal = counts[sorted[sorted.length - 1]];
    const bottomCandidates = sorted.filter(c => counts[c] === minVal);
    const eliminated = bottomCandidates.sort()[0]; // Alpha tie-break
    
    data.eliminated = eliminated;
    remaining = remaining.filter(c => c !== eliminated);
  }
}

function render(rounds, parent) {
  rounds.forEach((round, i) => {
    const container = document.createElement('div');
    container.className = 'round-container';

    const header = document.createElement('span');
    header.className = 'round-header';
    header.textContent = `Tabulation Phase ${i + 1}`;
    container.appendChild(header);

    const sortedEntries = Object.entries(round.counts).sort((a,b) => b[1] - a[1]);

    sortedEntries.forEach(([name, count]) => {
      const pct = round.total > 0 ? (count / round.total) * 100 : 0;
      
      const entry = document.createElement('div');
      entry.className = 'candidate-entry';
      entry.innerHTML = `<div style="margin-bottom:5px">${name}</div>`;

      const strip = document.createElement('div');
      strip.className = 'progress-strip';

      const bar = document.createElement('div');
      bar.className = 'bar-bg';
      const fill = document.createElement('div');
      fill.className = 'bar-fill';
      setTimeout(() => fill.style.width = pct + '%', 100);
      
      bar.appendChild(fill);
      strip.appendChild(bar);

      const stats = document.createElement('span');
      stats.className = 'vote-tally';
      stats.textContent = `${count} (${pct.toFixed(1)}%)`;
      strip.appendChild(stats);

      entry.appendChild(strip);
      container.appendChild(entry);
    });

    if (round.eliminated && !round.winner) {
      const elim = document.createElement('div');
      elim.className = 'elim-text';
      elim.textContent = `Eliminated: ${round.eliminated} (lowest votes)`;
      container.appendChild(elim);
    }

    if (round.winner) {
      const win = document.createElement('div');
      win.className = 'winner-banner';
      win.textContent = `✓ ELECTED: ${round.winner}`;
      container.appendChild(win);
    }

    parent.appendChild(container);
  });
}
</script>

</body>
</html>
